<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 透明抽奖</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="header-logo">
    <div class="logo-icon">◆</div>
    <span>透明抽奖</span>
  </a>
  <nav class="header-nav">
    <a href="index.html">活动</a>
    <a href="verify.html">独立验证</a>
  </nav>
</header>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">登录</div>
      <div class="auth-tab" data-tab="register">注册</div>
    </div>

    <!-- 登录表单 -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="loginEmail">邮箱</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">密码</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="请输入密码" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">登录</button>
    </form>

    <!-- 注册表单 -->
    <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="regUsername">用户名</label>
        <input class="form-input" type="text" id="regUsername" placeholder="给自己起个名字" required minlength="2">
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">邮箱</label>
        <input class="form-input" type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword">密码</label>
        <input class="form-input" type="password" id="regPassword" placeholder="至少6位" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword2">确认密码</label>
        <input class="form-input" type="password" id="regPassword2" placeholder="再次输入密码" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">注册</button>
    </form>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <p>透明抽奖 &copy; 2026 — 基于以太坊区块链的公平抽奖平台</p>
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const isLogin = tab.dataset.tab === 'login';
    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
    window.location.hash = isLogin ? '' : 'register';
  });
});

// Check URL hash for register tab
if (window.location.hash === '#register') {
  document.querySelector('.auth-tab[data-tab="register"]').click();
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (mockLogin(email, password)) {
    window.location.href = 'index.html';
  }
}

function handleRegister(e) {
  e.preventDefault();
  const username = document.getElementById('regUsername').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const password2 = document.getElementById('regPassword2').value;
  if (password !== password2) {
    showToast('两次输入的密码不一致', 'error');
    return;
  }
  if (mockRegister(username, email, password)) {
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
