<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 透明抽奖</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="header-logo">
    <div class="logo-icon">◆</div>
    <span>透明抽奖</span>
  </a>
  <nav class="header-nav">
    <a href="index.html">活动</a>
    <a href="verify.html">独立验证</a>
  </nav>
  <div class="header-actions" id="headerActions">
    <a href="login.html" class="btn btn-ghost" style="color:rgba(255,255,255,.85)" id="btnLogin">登录</a>
    <a href="login.html#register" class="btn btn-primary btn-sm" id="btnRegister">注册</a>
    <div id="userMenu" style="display:none;display:flex;align-items:center;gap:12px;">
      <a href="user.html" style="color:rgba(255,255,255,.85);font-size:.9375rem;" id="userNameDisplay"></a>
    </div>
  </div>
</header>

<div class="container">
  <div class="user-layout">
    <nav class="user-sidebar" id="sidebar">
      <a href="#" class="active" data-tab="registrations">📋 我的报名</a>
      <a href="#" data-tab="winnings">🎉 中奖记录</a>
      <a href="#" data-tab="settings">⚙️ 账号设置</a>
    </nav>
    <main class="user-content" id="userContent"></main>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <p>透明抽奖 &copy; 2026 — 基于以太坊区块链的公平抽奖平台</p>
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initAuthState();
  if (!getCurrentUser()) {
    window.location.href = 'login.html';
    return;
  }
  document.querySelectorAll('#sidebar a').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      document.querySelectorAll('#sidebar a').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      renderTab(link.dataset.tab);
    });
  });
  renderTab('registrations');
});

function renderTab(tab) {
  const content = document.getElementById('userContent');
  switch (tab) {
    case 'registrations': renderRegistrations(content); break;
    case 'winnings': renderWinnings(content); break;
    case 'settings': renderSettings(content); break;
  }
}

function renderRegistrations(container) {
  const registrations = mockGetUserRegistrations();
  if (registrations.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><h3>还没有报名记录</h3><p>去首页看看有什么活动吧</p><a href="index.html" class="btn btn-primary" style="margin-top:16px;">浏览活动</a></div>';
    return;
  }
  container.innerHTML = `
    <h2 style="margin-bottom:20px;">我的报名</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>活动名称</th><th>报名序号</th><th>状态</th><th>报名时间</th><th>操作</th></tr></thead>
        <tbody>${registrations.map(r => `
          <tr>
            <td><a href="activity.html?id=${r.activityId}" style="font-weight:500;">${r.activityName}</a></td>
            <td><span class="font-mono">#${r.index}</span></td>
            <td><span class="badge ${r.status === 'drawed' ? (r.won ? 'badge-warning' : 'badge-neutral') : 'badge-info'}">${r.won ? '🎉 中奖' : r.status === 'active' ? '进行中' : '已开奖'}</span></td>
            <td class="text-sm text-secondary">${r.time}</td>
            <td><a href="activity.html?id=${r.activityId}" class="btn btn-secondary btn-sm">查看详情</a></td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>`;
}

function renderWinnings(container) {
  const winnings = mockGetUserWinnings();
  if (winnings.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><h3>还没有中奖记录</h3><p>多参与几个活动试试手气吧</p></div>';
    return;
  }
  container.innerHTML = `
    <h2 style="margin-bottom:20px;">中奖记录</h2>
    <div class="winner-cards">
      ${winnings.map(w => `
        <div class="winner-card">
          <div class="winner-rank">中奖序号</div>
          <div class="winner-index">#${w.winnerIndex}</div>
          <div style="margin-top:8px;font-weight:500;">${w.activityName}</div>
          <div class="text-sm text-secondary" style="margin-top:4px;">${w.time}</div>
          <a href="activity.html?id=${w.activityId}" style="font-size:.875rem;margin-top:12px;display:inline-block;">查看详情 →</a>
        </div>
      `).join('')}
    </div>`;
}

function renderSettings(container) {
  const user = getCurrentUser();
  container.innerHTML = `
    <h2 style="margin-bottom:20px;">账号设置</h2>
    <div class="card" style="max-width:480px;">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input class="form-input" value="${user.username}" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input class="form-input" value="${user.email}" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">链上地址（托管）</label>
        <input class="form-input font-mono" value="${user.ethAddress}" disabled style="font-size:.8125rem;">
        <p class="form-hint">这是平台为你管理的以太坊地址，用于链上报名记录。你无需了解钱包知识。</p>
      </div>
    </div>`;
}
</script>
</body>
</html>
